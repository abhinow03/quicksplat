# quicksplat — COLMAP configuration
# Generated from a real run on RTX 4090 — adjust paths and env names to match your setup.
#
# These are the exact flags used in the pipeline. splat.sh passes them directly
# on the command line, so this file is for reference / manual runs only.
#
# COLMAP version: 4.0.3 (CUDA)
# Note: COLMAP 4.x renamed SiftExtraction → FeatureExtraction and
#       SiftMatching → FeatureMatching. The old names will silently fail.

[feature_extractor]
database_path     = workspace/colmap/database.db
image_path        = workspace/colmap/images
ImageReader.single_camera = 1
ImageReader.camera_model  = OPENCV
FeatureExtraction.use_gpu  = 1

# OPENCV model captures radial + tangential distortion (k1,k2,p1,p2).
# 3DGRUT only accepts SIMPLE_PINHOLE, PINHOLE, or OPENCV_FISHEYE —
# so after mapping we run image_undistorter to convert to PINHOLE.

[exhaustive_matcher]
database_path           = workspace/colmap/database.db
FeatureMatching.use_gpu = 1

# exhaustive_matcher checks all pairs — best quality for small image sets (<500 frames).
# For larger sets use sequential_matcher or vocab_tree_matcher instead.

[mapper]
database_path = workspace/colmap/database.db
image_path    = workspace/colmap/images
output_path   = workspace/colmap/sparse

[image_undistorter]
image_path  = workspace/colmap/images
input_path  = workspace/colmap/sparse/0
output_path = workspace/colmap/dense
output_type = COLMAP

# output_type COLMAP produces PINHOLE cameras, which 3DGRUT accepts.
# After running this, manually copy dense/sparse/*.bin → dense/sparse/0/
# (3DGRUT's dataset loader expects the files one level deeper than where
# image_undistorter places them.)
